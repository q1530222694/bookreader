<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>GitHub 账号生成器</title>
    <style>
        body { width: 350px; padding: 15px; font-family: Arial, sans-serif; margin: 0; box-sizing: border-box; }
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: bold; color: #333; }
        .input-group { display: flex; gap: 5px; }
        input { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        button { padding: 5px 10px; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 4px; font-size: 12px; }
        button:hover { background: #0056b3; }
        .copy-btn { background: #28a745; white-space: nowrap; }
        .copy-btn:hover { background: #218838; }
        #generateBtn { width: 100%; margin-top: 10px; padding: 10px; background: #24292e; font-size: 14px; border-radius: 4px; }
        #generateBtn:hover { background: #1b1f23; }
        
        /* 历史记录区域样式 */
        .history-container { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .history-title { font-size: 14px; font-weight: bold; color: #24292e; }
        #clearBtn { background: #dc3545; padding: 3px 8px; font-size: 11px; }
        #clearBtn:hover { background: #bd2130; }
        
        .history-list { max-height: 200px; overflow-y: auto; border: 1px solid #eee; border-radius: 4px; padding: 5px; background: #f8f9fa; }
        .history-item { padding: 8px; border-bottom: 1px solid #e9ecef; font-size: 12px; position: relative; }
        .history-item:last-child { border-bottom: none; }
        .history-time { color: #6a737d; font-size: 11px; margin-bottom: 4px; }
        .history-details { line-height: 1.6; color: #24292e; }
        /* 新增 flex-wrap 防止按钮拥挤 */
        .history-ops { margin-top: 5px; display: flex; gap: 5px; flex-wrap: wrap; }
        .mini-copy-btn { padding: 2px 6px; font-size: 11px; background: #6c757d; margin-bottom: 2px; }
        .mini-copy-btn:hover { background: #5a6268; }
    </style>
</head>
<body>
    <!-- 新增：邮箱前缀展示与复制 -->
    <div class="form-group">
        <label>邮箱前缀</label>
        <div class="input-group">
            <input type="text" id="emailPrefix" readonly>
            <button class="copy-btn" data-target="emailPrefix">复制</button>
        </div>
    </div>
    <div class="form-group">
        <label>邮箱账号</label>
        <div class="input-group">
            <input type="text" id="email" readonly>
            <button class="copy-btn" data-target="email">复制</button>
        </div>
    </div>
    <div class="form-group">
        <label>Github 用户名</label>
        <div class="input-group">
            <input type="text" id="username" readonly>
            <button class="copy-btn" data-target="username">复制</button>
        </div>
    </div>
    <div class="form-group">
        <label>Github 密码</label>
        <div class="input-group">
            <input type="text" id="password" readonly>
            <button class="copy-btn" data-target="password">复制</button>
        </div>
    </div>
    <button id="generateBtn">生成新账号并同步至注册页</button>
    
    <div class="history-container">
        <div class="history-header">
            <span class="history-title">历史生成记录</span>
            <button id="clearBtn">清空记录</button>
        </div>
        <div id="historyList" class="history-list">
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
